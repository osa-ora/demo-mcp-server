name: MCP Server Client Orchestrator

repo: https://github.com/osa-ora/ocp-ai-mcp-client-demo

prerequisites:
  - python3
  - pip
  - git


install:
  steps:

    - type: check_python

    - type: clone_git
      repo: https://github.com/osa-ora/ocp-ai-mcp-client-demo
      path: "{{WORKSPACE}}/ocp-ai-mcp-client-demo"

    - type: venv
      path: "{{WORKSPACE}}/ocp-ai-mcp-client-demo"

    - type: install
      path: "{{WORKSPACE}}/ocp-ai-mcp-client-demo"


run:
  steps:

    - type: run
      path: "{{WORKSPACE}}/ocp-ai-mcp-client-demo"
      mode: terminal
      command: "source .venv/bin/activate && python3 app.py"

    - type: health
      url: http://localhost:8080/health
      retries: 10
      delay_seconds: 2
