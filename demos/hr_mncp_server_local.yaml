name: HR MCP Server Demo

repo: https://github.com/osa-ora/hr-mcp-agent-demo

prerequisites:
  - python3
  - pip
  - git
  - postgres

steps:
  - type: check_python

  - type: check_service
    service: postgres
    host: localhost
    port: 5432

  - type: clone_git
    repo: https://github.com/osa-ora/hr-mcp-agent-demo
    path: "{{WORKSPACE}}/hr-mcp-agent-demo"

  - type: venv
    path: "{{WORKSPACE}}/hr-mcp-agent-demo"

  - type: install
    path: "{{WORKSPACE}}/hr-mcp-agent-demo"

  - type: run
    path: "{{WORKSPACE}}/hr-mcp-agent-demo"
    command: "python3 app.py"

  - type: health
    url: http://localhost:8080/health
    retries: 10
    delay_seconds: 2
