name: MCP Client Demo on OCP

repo: https://github.com/osa-ora/ocp-ai-mcp-client-demo
port: 80

prerequisites:
  - oc command
  - oc login

install:
  steps:

    - type: oc_command
      command: new-project hr-mcp
      ignore_error: true

    - type: oc_command
      command: apply -f https://raw.githubusercontent.com/osa-ora/ocp-ai-mcp-client-demo/main/ocp/configmap.yaml -n hr-mcp

    - type: oc_command
      command: new-app python:3.12-minimal-ubi10~https://github.com/osa-ora/ocp-ai-mcp-client-demo --name=ocp-ai-mcp-client-demo -n hr-mcp

    - type: oc_command
      command: set env deployment/ocp-ai-mcp-client-demo --from=configmap/mcp-client-config -n hr-mcp

    - type: oc_command
      command: rollout status deployment/ocp-ai-mcp-client-demo -n hr-mcp --timeout=180s

    - type: oc_command
      command: expose svc/ocp-ai-mcp-client-demo -n hr-mcp

    - type: shell_command
      command: 'echo CONFIG REQUIRED: please set LLM_BASE_URL and LLM_API_KEY in ConfigMap mcp-client-config (namespace hr-mcp) using: oc edit configmap mcp-client-config -n hr-mcp'

health:
  steps:

    - type: oc_command
      command: wait --for=condition=available deployment/ocp-ai-mcp-client-demo -n hr-mcp --timeout=180s

    - type: oc_command
      command: get route ocp-ai-mcp-client-demo -n hr-mcp -o jsonpath='{.spec.host}'
      register: MCP_ROUTE

    - type: health
      url: "http://{{MCP_ROUTE}}/health"
      retries: 10
      delay_seconds: 2
  
