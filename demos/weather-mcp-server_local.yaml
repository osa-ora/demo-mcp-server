name: Weather MCP Server Demo

repo: https://github.com/osa-ora/weather-mcp-server
port: 8060

prerequisites:
  steps:
    - type: python
      min_version: "3.10"

    - type: pip

    - type: git

install:
  steps:
    - type: clone_git
      repo: "{{repo}}"
      path: "{{workspace}}/weather-mcp-server-demo"

    - type: venv
      path: "{{workspace}}/weather-mcp-server-demo"

    - type: install
      path: "{{workspace}}/weather-mcp-server-demo"

run:
  steps:
    - type: env
      variables:
        PORT: "{{port}}"

    - type: run
      path: "{{workspace}}/weather-mcp-server-demo"
      mode: terminal
      command: "./.venv/bin/python app.py"

health:
  steps:
    - type: mcp
      endpoint: "http://localhost:{{port}}/mcp"
      retries: 10
      delay_seconds: 2
