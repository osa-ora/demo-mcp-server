name: HR MCP Server Demo

repo: https://github.com/osa-ora/hr-mcp-agent-demo
port: 8000

prerequisites:
  - python3
  - pip
  - git
  - postgres is available in PATH (psql)

install:
  steps:

    - type: check_python
    - type: check_postgres

    - type: shell_command
      command: 'psql postgres -c "CREATE DATABASE hrdb;"'
      ignore_error: true
    
    - type: shell_command
      command: 'psql hrdb -f "{{WORKSPACE}}/hr-mcp-agent-demo/db_scripts/schema.sql"'
    
    - type: shell_command
      command: 'psql hrdb -f "{{WORKSPACE}}/hr-mcp-agent-demo/db_scripts/load_sample_data.sql"'

    - type: clone_git
      repo: https://github.com/osa-ora/hr-mcp-agent-demo
      path: "{{WORKSPACE}}/hr-mcp-agent-demo"

    - type: venv
      path: "{{WORKSPACE}}/hr-mcp-agent-demo"

    - type: install
      path: "{{WORKSPACE}}/hr-mcp-agent-demo"


run:
  steps:

    - type: env
      variables:
        PORT: "{{port}}"

    - type: run
      path: "{{WORKSPACE}}/hr-mcp-agent-demo"
      mode: terminal
      command: "./.venv/bin/python app.py"

    - type: port_check
      host: localhost
      port: "{{port}}"
      retries: 10
      delay_seconds: 2
