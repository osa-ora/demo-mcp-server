name: OGX Local Demo

repo: https://github.com/osa-ora/ogx-local-demo
port: 8000

prerequisites:
  - python3
  - uv
  - ollama
  - jupyter lab installed

install:
  steps:
  
    - type: check_command
      command: python3 --version

    - type: check_command
      command: uv --version

    - type: check_command
      command: ollama --version

    - type: shell_command
      command: 'ollama list'

    - type: shell_command
      command: 'ollama pull llama3.2:3b'

    - type: shell_command
      command: >
        uv tool install --force 'ogx[starter]'
        --python 3.13
        --with "huggingface_hub<0.26.0"
        --with "sentence-transformers>=2.6.0"

    - type: clone_git
      repo: https://github.com/osa-ora/ogx-local-demo
      path: "{{WORKSPACE}}/ogx-local-demo"

run:
  steps:

    - type: run
      path: "{{WORKSPACE}}/ogx-local-demo"
      mode: terminal
      command: "OLLAMA_URL=http://localhost:11434/v1 uv run ogx run starter"

    # RAG test application
    - type: run
      path: "{{WORKSPACE}}/ogx-local-demo"
      mode: terminal
      command: "jupyter lab"
